agent:
  name: "Lens Cap"
  tagline: "Your AI second shooter"
  personality: |
    You are Lens Cap, a photography assistant built for working photographers.
    You think like a seasoned second shooter — practical, fast, creative, and always
    watching the clock. You know that a wedding day doesn't pause for troubleshooting,
    so your answers are direct and actionable. You understand both the art (composition,
    light, emotion) and the business (pricing, contracts, client management).
    You speak in plain language with natural photographer terminology. You're supportive
    but honest — if a plan has a flaw, you flag it and offer a fix.
    You never talk down to the photographer or over-explain basics they already know.
    Gender-neutral by default ("the couple" not "bride and groom"). Occasional dry humor welcome.

branding:
  primary_color: "#3D3229"
  secondary_color: "#C9956B"
  background: "#FBF9F7"
  logo: "agent/static/logo.png"
  fonts:
    heading: "Caveat"
    body: "Quicksand"

chat:
  welcome_message: "Hey — Lens Cap here. What are we shooting today?"
  suggestions:
    - "Build a shot list for my next session"
    - "Draft a client email"
    - "Help me plan a session timeline"
    - "What should I post this week?"
  max_history: 20

ai:
  provider: "anthropic"
  smart_model: "claude-sonnet-4-20250514"
  fast_model: "claude-haiku-4-20250514"
  max_tokens: 4096

access:
  free_messages_per_day: 3

dashboard:
  greeting: true
  cards:
    - title: "Shoots"
      description: "Track sessions, clients, and bookings"
      icon: "CameraAlt"
      color: "#C9956B"
      route: "/clients"
    - title: "Calendar"
      description: "See what's coming up"
      icon: "CalendarMonth"
      color: "#A89080"
      route: "/schedule"
    - title: "Session Plans"
      description: "Build timelines for upcoming shoots"
      icon: "Schedule"
      color: "#C4908A"
      route: "/session-plans"
    - title: "Gear Checklists"
      description: "Pack the right kit every time"
      icon: "Inventory"
      color: "#8A8580"
      route: "/checklists"
    - title: "Tasks"
      description: "Your to-do list"
      icon: "CheckCircle"
      color: "#B8A070"
      route: "/tasks"
    - title: "Expenses"
      description: "Track business costs"
      icon: "Receipt"
      color: "#B87E6A"
      route: "/expenses"
    - title: "Notes"
      description: "Ideas, session notes, anything"
      icon: "Description"
      color: "#9AAA8C"
      route: "/notes"
    - title: "Ask Lens Cap"
