tools:
  - name: "knowledge_base"
    knowledge_tool: true
  - name: "manage_data"
    description: "Create, list, update, or delete data in the app — expenses, shoots, tasks, calendar events, notes, checklists, and session plans. Use this whenever the user wants to save, track, log, add, remove, edit, or view their data. IMPORTANT: Use 'list' first to find existing record IDs before updating or deleting. For checklists, use update with add_items to add to an existing list instead of creating a new one. Always include the ID when updating or deleting."
    module: "agent.tools.spoke_tools"
    function: "execute_spoke_tool"
    schema:
      type: "object"
      properties:
        resource:
          type: "string"
          description: "Which data to manage: expenses, clients, tasks, schedule, notes, checklists, session_plans"
          enum: ["expenses", "clients", "tasks", "schedule", "notes", "checklists", "session_plans"]
        action:
          type: "string"
          description: "What to do: create, list, update, delete"
          enum: ["create", "list", "update", "delete"]
        data:
          type: "object"
          description: "Fields for create/update. For expenses: {description, amount, category, date, vendor}. For clients/shoots: {name, email, phone, notes, tags}. For tasks: {title, description, priority, due_date, status}. For schedule: {title, date, start_time, end_time, description}. For notes: {title, content, tags}. For checklists: {title, shoot_type, items (list of strings)} for create, or {add_items (list of strings)} to add to existing, or {remove_item (string)} to remove one. For session_plans: {title, session_type, date, location, client_name, blocks} for create, or {add_blocks} to append blocks."
        id:
          type: "integer"
          description: "Record ID for update/delete actions"
        filters:
          type: "object"
          description: "Filters for list action: {category, status, q (search), upcoming (bool), limit (int)}"
      required: ["resource", "action"]

knowledge:
  directory: "agent/knowledge"

memory:
  enabled: true
  extraction_categories:
    - preferences
    - facts
    - goals
    - gear
    - clients
  session_ttl_seconds: 300
