  tasks:
    enabled: true
    label: "Tasks"
    label_singular: "Task"
    icon: "CheckCircle"
    color: "#66BB6A"
  expenses:
    enabled: true
    label: "Expenses"
    label_singular: "Expense"
    icon: "Receipt"
    color: "#AB47BC"
  notes:
    enabled: true
    label: "Notes"
    label_singular: "Note"
    icon: "Description"
